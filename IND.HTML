<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shashikant Stock Prediction</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* HEADER */

.header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* GRID */

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
padding:30px;
}

/* CARD */

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
box-shadow:0px 10px 30px rgba(0,0,0,0.6);
}

/* FORM */

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:6px;
border:none;
font-size:15px;
background:#020617;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 6px #38bdf8;
}

/* BUTTON */

button{
background:linear-gradient(90deg,#22c55e,#4ade80);
border:none;
padding:12px;
width:100%;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* RESULT */

.result{
margin-top:15px;
font-size:20px;
color:#38bdf8;
font-weight:bold;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}

th{
background:#020617;
}

/* CHART */

canvas{
background:white;
border-radius:10px;
padding:10px;
}

/* RESPONSIVE */

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">
📈 Reliance Stock Market price Prediction Dashboard ----- 
     shashikant kumar
</div>

<div class="container">

<!-- FORM -->

<div class="card">

<h3>🧠 Predict RELIANCE Stock Market Price</h3>

<input id="open" type="number" placeholder="Open Price">

<input id="high" type="number" placeholder="High Price">

<input id="low" type="number" placeholder="Low Price">

<input id="volume" type="number" placeholder="Volume">

<input id="year" type="number" placeholder="Year">

<input id="month" type="number" placeholder="Month">

<input id="day" type="number" placeholder="Day">

<button onclick="predictPrice()">Predict Price</button>

<div class="result" id="prediction">
Prediction will appear here
</div>

</div>

<!-- CHART -->

<div class="card">

<h3>📊 Stock Chart</h3>

<canvas id="chart"></canvas>

</div>

<!-- HISTORY -->

<div class="card" style="grid-column:1/3">

<h3>📜 Prediction History</h3>

<table>

<thead>

<tr>
<th>Date</th>
<th>Open</th>
<th>High</th>
<th>Low</th>
<th>Prediction</th>
</tr>

</thead>

<tbody id="history">

</tbody>

</table>

</div>

</div>

<script>

/* Chart */

const ctx = document.getElementById('chart');

let priceChart = new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:"Predicted Price",
data:[],
borderWidth:3,
borderColor:"#38bdf8",
tension:0.4
}]
}
});

/* Prediction */

function predictPrice(){

let open = parseFloat(document.getElementById("open").value);
let high = parseFloat(document.getElementById("high").value);
let low = parseFloat(document.getElementById("low").value);

if(!open || !high || !low){

alert("Please fill all price fields");
return;

}

/* simple AI demo formula */

let prediction = ((open + high + low) / 3) + Math.random()*10;

prediction = prediction.toFixed(2);

document.getElementById("prediction").innerHTML =
"Predicted Price : ₹ " + prediction;

/* date */

let year = document.getElementById("year").value;
let month = document.getElementById("month").value;
let day = document.getElementById("day").value;

let date = day + "-" + month + "-" + year;

/* add history */

let row = `
<tr>
<td>${date}</td>
<td>${open}</td>
<td>${high}</td>
<td>${low}</td>
<td>₹ ${prediction}</td>
</tr>
`;

document.getElementById("history").innerHTML += row;

/* update chart */

priceChart.data.labels.push(date);

priceChart.data.datasets[0].data.push(prediction);

priceChart.update();

}

</script>

</body>
</html>
